name: 🧱 Scaffold regression
description: An asset in assets/ no longer validates, or its cross-references don't resolve.
title: "[scaffold] "
labels: ["scaffold-regression", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: >-
        Use this when a runnable scaffold (`assets/ixbrl-skeleton.xhtml`,
        `extension-schema.xsd`, a linkbase, the taxonomy/report package, or the
        catalog) fails validation, has a dangling reference, or produces output a
        regulator's validator rejects.
  - type: input
    id: asset
    attributes:
      label: Which asset?
      placeholder: assets/extension-schema.xsd
    validations:
      required: true
  - type: dropdown
    id: tool
    attributes:
      label: How was it caught?
      options:
        - xmllint --noout
        - tests/check_skill.py (cross-reference resolution)
        - scripts/check_facts.py
        - Arelle (scripts/validate_with_arelle.sh)
        - A regulator validator (ESEF / EFM / FRC / …)
        - Other
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Command and output
      description: Paste the exact command run and the error/validator message (include the validator code if any, e.g. `ESEF.2.2.1`, `xbrl.5.2.5.2`).
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: checkboxes
    id: coc
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
